
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personas</title>
</head>
<body>
    <h2>Formulario de Registro</h2>
    
    <form action="avatarfichero.php" method="POST">
        
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nom_per" required><br><br>

        <label for="correo">Correo Electrónico:</label><br>
        <input type="email" id="email" name="email_per" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="pass_per" required><br><br>

        <button type="submit">Registrar Persona</button>
    </form>
</body>
</html>
