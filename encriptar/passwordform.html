<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cliente</title>
</head>
<body>
    <h2>Formulario de Registro</h2>
    <form action="passwordejercicio.php" method="POST">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nom_cli" required><br><br>

        <label for="correo">Correo Electrónico:</label><br>
        <input type="email" id="email" name="email_cli" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password_cli" required><br><br>

        <button type="submit">Registrar Cliente</button>
    </form>
</body>
</html>
