<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tres en Raya</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        table { border-collapse: collapse; margin: 20px auto; }
        td { width: 80px; height: 80px; border: 4px solid #fb83ff; text-align: center; font-size: 24px; font-family: Arial; cursor: pointer; }
    </style>
</head>
<body>

<table>
  <tr><td></td><td></td><td></td></tr>
  <tr><td></td><td></td><td></td></tr>
  <tr><td></td><td></td><td></td></tr>
</table>

<script>
    var letra = "X";

    $("td").on("click",function(){
        if(letra == "X")
    {
        letra = "O"
    }
    else{
        letra = "X"
    }
    $(this).text(letra)
    $(this).off("click")
    })
    
    
</script>
    
</body>
</html>
