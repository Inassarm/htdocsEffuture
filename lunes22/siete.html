<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        input { width: 10%; text-align: center; }
    </style>
</head>
<body>

    <input id="letra" maxlength="1" placeholder="Letra">
    <button onclick="comprobar()">Comprobar</button>
    <br><br>

    <input type="text" value="C" readonly id="oculta1">
    <input type="text" value="A" readonly id="oculta2">
    <input type="text" value="S" readonly id="oculta3">
    <input type="text" value="A" readonly id="oculta4">
    <br><br>

    <input type="text" id="acierto1">
    <input type="text" id="acierto2">
    <input type="text" id="acierto3">
    <input type="text" id="acierto4">

<script>
function comprobar() {
    var l = $("#letra").val().toUpperCase();
    $("#letra").val("").focus();

    if (l == "") return;

    
    l == $("#oculta1").val() && $("#acierto1").val(l);
    l == $("#oculta2").val() && $("#acierto2").val(l);
    l == $("#oculta3").val() && $("#acierto3").val(l);
    l == $("#oculta4").val() && $("#acierto4").val(l);
    
    // Comprobar si ganó
    setTimeout(() => {
        if ($("#acierto1").val() == "C" && $("#acierto2").val() == "A" && $("#acierto3").val() == "S" && $("#acierto4").val() == "A") {
            alert("¡Ganaste!");
            location.reload();
        }
    }, 10);
}
</script>
    
</body>
</html>
