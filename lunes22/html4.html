<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Document</title>
</head>
<body>

<script>
   
    for (let i = 1; i <= 28; i++) {
        
        
        $("body").append("<p>"+i+"</p>")

    }
        $("p").on("click", function(){
            var texto = $(this).text();
            alert(texto);
            $(this).css("background-color", "yellow");
            $(this).css("color", "red");
        })
    
</script>

</body>
</html>
