<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Búsqueda en tiempo real</h1>
    <input type="text" name="" placeholder="Buscar" onkeyup="encontrar()">
    <div></div>
    <script>
        function encontrar()
        {
            //tenemos que esribir lo que escriben en el input
            var texto = $("input").val();
            //alert(texto);
            //vamos a llamar a un documento php enviando datos y recibiendo echos
            $.post(
                    "buscar.php", //a quién llamo
                    {cosabuscada:texto}, //lo que envío
                    function(echosdelphp)
                    {
                        $("div").html(echosdelphp);

                    }

            )
            
        }
    </script>
    
</body>
</html>
