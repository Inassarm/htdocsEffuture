<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <p>Texto original</p>
    <h1>new!!!!</h1>
    
    <button onclick="mover()">Pasar texto</button>

    <script>
        function mover(){
        
            $("p").text($("h1").text());
            $("p").empty(); 
        }
    </script>
</body>
</html>
