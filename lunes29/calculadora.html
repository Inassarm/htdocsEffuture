<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Calculadora Resumida</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
	<p></p>
	<input type="number" placeholder="Número 1"><br>
	<input type="number" placeholder="Número 2"><br>
	<button onclick="calcular('s')">+</button>
	<button onclick="calcular('r')">-</button>
	<button onclick="calcular('m')">*</button>
	<button onclick="calcular('d')">/</button>

	<script>
		function calcular(operacion) {
			
			var n1 = parseFloat($("input").first().val()) || 0;
			var n2 = parseFloat($("input").last().val()) || 0;
			var total;

			switch(operacion) {
				case 's': total = n1 + n2; break;
				case 'r': total = n1 - n2; break;
				case 'm': total = n1 * n2; break;
				case 'd': total = (n2 !== 0) ? (n1 / n2) : "Error"; break;
			}

			$("p").text(total);
		}
	</script>
</body>
</html>
