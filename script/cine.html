<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStar - Tu Cine Interactivo</title>
    <style>
        /* --- ESTILOS CSS --- */
        :root {
            --primary: #e50914;
            --background: #141414;
            --surface: #2f2f2f;
            --text: #ffffff;
            --seat-available: #444451;
            --seat-selected: #00ff66;
            --seat-occupied: #1e1e24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            border-left: 5px solid var(--primary);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* Cartelera de Películas */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background-color: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        /* Posters simulados con CSS */
        .movie-poster {
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            padding: 20px;
            background: linear-gradient(45deg, #111, #333);
            border-bottom: 4px solid var(--primary);
        }

        .movie-info {
            padding: 15px;
        }

        .movie-info h3 {
            margin: 0 0 10px 0;
        }

        .movie-info p {
            font-size: 0.9rem;
            color: #ccc;
            margin: 0;
        }

        /* Ventana Modal Interactiva */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: var(--primary);
        }

        /* Sala de Cine (Asientos) */
        .theater-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .screen {
            background-color: #fff;
            height: 10px;
            width: 80%;
            margin: 15px 0 30px 0;
            box-shadow: 0 3px 20px rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            text-align: center;
        }

        .screen-text {
            font-size: 0.7rem;
            color: #777;
            margin-top: 15px;
        }

        .seating-chart {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .seat {
            width: 30px;
            height: 26px;
            background-color: var(--seat-available);
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .seat.selected {
            background-color: var(--seat-selected);
        }

        .seat.occupied {
            background-color: var(--seat-occupied);
            cursor: not-allowed;
        }

        .seat:not(.occupied):hover {
            transform: scale(1.1);
        }

        /* Leyenda */
        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Resumen de Compra */
        .booking-summary {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .checkout-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: background 0.2s;
        }

        .checkout-btn:hover {
            background-color: #b80710;
        }
    </style>
</head>
<body>

    <header>
        <h1>CINESTAR</h1>
    </header>

    <div class="container">
        <h2>En Cartelera</h2>
        <div class="movies-grid" id="movies-container">
            </div>
    </div>

    <div class="modal" id="booking-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-movie-title">Selecciona tus asientos</h2>
            <p id="modal-movie-genre" style="color: var(--primary); margin-top: -15px; font-weight: bold;"></p>

            <div class="theater-container">
                <div class="screen"></div>
                <div class="screen-text">PANTALLA</div>
                
                <div class="seating-chart" id="seating-chart">
                    </div>

                <div class="legend">
                    <div class="legend-item"><div class="seat"></div> Disponible</div>
                    <div class="legend-item"><div class="seat selected"></div> Seleccionado</div>
                    <div class="legend-item"><div class="seat occupied"></div> Ocupado</div>
                </div>

                <div class="booking-summary">
                    <p>Asientos seleccionados: <span id="count">0</span></p>
                    <p>Total a pagar: <strong>$<span id="total">0</span></strong></p>
                    <button class="checkout-btn" id="checkout-btn">Confirmar Reserva</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CÓDIGO JAVASCRIPT ---

        // Base de datos de películas simulada
        const movies = [
            { id: 1, title: "Interestelar 2", genre: "Ciencia Ficción", price: 8, color: "#1a365d" },
            { id: 2, title: "La Noche del Demonio", genre: "Terror", price: 7, color: "#4a0e17" },
            { id: 3, title: "Velocidad Absoluta", genre: "Acción", price: 9, color: "#5c3d03" },
            { id: 4, title: "Aventuras en la Red", genre: "Animación", price: 6, color: "#104c3c" }
        ];

        let currentMovie = null;
        let selectedSeatsCount = 0;

        const moviesContainer = document.getElementById('movies-container');
        const modal = document.getElementById('booking-modal');
        const closeModal = document.getElementById('close-modal');
        const seatingChart = document.getElementById('seating-chart');
        const countSpan = document.getElementById('count');
        const totalSpan = document.getElementById('total');
        const checkoutBtn = document.getElementById('checkout-btn');

        // 1. Renderizar la cartelera cinematográfica
        function displayMovies() {
            moviesContainer.innerHTML = "";
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <div class="movie-poster" style="background: linear-gradient(135deg, #111, ${movie.color})">
                        ${movie.title}
                    </div>
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <p>Género: ${movie.genre}</p>
                        <p style="color: var(--primary); font-weight: bold; margin-top: 5px;">Precio: $${movie.price}</p>
                    </div>
                `;
                card.addEventListener('click', () => openBookingModal(movie));
                moviesContainer.appendChild(card);
            });
        }

        // 2. Abrir Modal y configurar la película elegida
        function openBookingModal(movie) {
            currentMovie = movie;
            document.getElementById('modal-movie-title').innerText = movie.title;
            document.getElementById('modal-movie-genre').innerText = movie.genre;
            
            // Resetear valores de compra
            selectedSeatsCount = 0;
            updateSummary();

            // Generar mapa de asientos aleatorio para simular interactividad realista
            generateSeats();

            modal.style.display = 'flex';
        }

        // 3. Generar dinámicamente los asientos de la sala
        function generateSeats() {
            seatingChart.innerHTML = "";
            // Generamos un mapa de 40 asientos (5 filas x 8 columnas)
            for (let i = 0; i < 40; i++) {
                const seat = document.createElement('div');
                seat.classList.add('seat');

                // Hacer que algunos asientos ya aparezcan ocupados de forma aleatoria
                if (Math.random() < 0.3) {
                    seat.classList.add('occupied');
                }

                // Evento click para seleccionar/deseleccionar asientos libres
                seat.addEventListener('click', () => {
                    if (!seat.classList.contains('occupied')) {
                        seat.classList.toggle('selected');
                        
                        // Actualizar contador basado en la clase 'selected'
                        if (seat.classList.contains('selected')) {
                            selectedSeatsCount++;
                        } else {
                            selectedSeatsCount--;
                        }
                        updateSummary();
                    }
                });

                seatingChart.appendChild(seat);
            }
        }

        // 4. Actualizar precios en tiempo real
        function updateSummary() {
            countSpan.innerText = selectedSeatsCount;
            totalSpan.innerText = selectedSeatsCount * (currentMovie ? currentMovie.price : 0);
        }

        // 5. Cerrar el Modal
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // 6. Botón de checkout final
        checkoutBtn.addEventListener('click', () => {
            if (selectedSeatsCount > 0) {
                alert(`¡Reserva Exitosa!\nHas reservado ${selectedSeatsCount} asientos para "${currentMovie.title}". Total: $${selectedSeatsCount * currentMovie.price}. ¡Disfruta la función!`);
                modal.style.display = 'none';
            } else {
                alert('Por favor, selecciona al menos un asiento antes de continuar.');
            }
        });

        // Inicializar la app web
        displayMovies();
    </script>
</body>
</html>
